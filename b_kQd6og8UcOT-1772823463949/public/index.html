<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dad's Apple Catch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    #gameContainer {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 100vw;
      max-height: 100vh;
    }

    #gameCanvas {
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%);
    }

    /* Mobile Controls */
    #mobileControls {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 400px;
      padding: 10px 20px;
      margin-top: 10px;
      gap: 8px;
    }

    #controlsRow {
      display: flex;
      width: 100%;
      justify-content: space-between;
      gap: 20px;
    }

    .controlBtn {
      flex: 1;
      padding: 18px 10px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.9);
      color: #667eea;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .controlBtn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .controlBtn.vertical {
      flex: none;
      width: 100px;
      padding: 12px 10px;
    }

    /* Show mobile controls on touch devices */
    @media (hover: none) and (pointer: coarse) {
      #mobileControls {
        display: flex;
      }
    }

    /* Instructions text */
    #instructions {
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
    }

    @media (hover: none) and (pointer: coarse) {
      #instructions {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="mobileControls">
      <button class="controlBtn vertical" id="upBtn">&#9650; UP</button>
      <div id="controlsRow">
        <button class="controlBtn" id="leftBtn">&#9664; LEFT</button>
        <button class="controlBtn" id="rightBtn">RIGHT &#9654;</button>
      </div>
      <button class="controlBtn vertical" id="downBtn">&#9660; DOWN</button>
    </div>
    <p id="instructions">Use arrow keys to move</p>
  </div>
  <script src="game.js"></script>
</body>
</html>
